<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Adicionar Amigos (FREQsys)</title>

    <!-- Simulação do CSS Global do site (Main.css mock) para testar isoladamente -->
    <style>
        :root {
            --bg: #0d0d12;
            --bg2: #13131a;
            --bg3: #14121a;
            --card: #131118;
            --border: rgba(255, 80, 160, 0.12);
            --border2: rgba(255, 80, 160, 0.25);
            --a1: #ff3cb4;
            --a2: #ff6b3d;
            --a3: #ffc83c;
            --a4: #ffe599;
            --green: #72efdd;
            --red: #ff5c7c;
            --text: #f8eef6;
            --text2: rgba(248, 238, 246, 0.45);
            --text3: rgba(248, 238, 246, 0.15);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Figtree', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>

    <!-- O CSS real do Módulo Mockup (Namespace fs-friends-*) -->
    <link rel="stylesheet" href="friends-mockup.css">
</head>

<body>

    <!--
        [ MÓDULO: CONTAINER PRINCIPAL DO SISTEMA DE AMIGOS ]
        Pode ser injetado via innerHTML num modal ou painel lateral no site principal.
        Utilizado prefixo 'fs-' (FREQsys) e 'fs-friends-' para não conflitar com CSS Global.
    -->
    <div class="fs-friends-container">

        <!-- Cabeçalho -->
        <header class="fs-friends-header">
            <h2 class="fs-friends-title">Buscar e Adicionar</h2>
            <p class="fs-friends-subtitle">Conecte-se com produtores, vocais e artistas encontrando pelo @nome</p>
        </header>

        <!-- Navegação em Abas (Busca, Pendentes, Meus Amigos) -->
        <nav class="fs-friends-tabs">
            <div class="fs-tab fs-active" id="fs-tab-search">Busca</div>
            <div class="fs-tab" id="fs-tab-requests">Pedidos</div>
            <div class="fs-tab" id="fs-tab-friends">Amigos</div>
        </nav>

        <!-- CONTEÚDO 1: ABA DE BUSCA -->
        <div class="fs-tab-content fs-active" id="fs-content-search">
            <!-- Campo de Busca -->
            <div class="fs-friends-search-area">
                <div class="fs-friends-input-wrapper">
                    <span class="fs-friends-input-icon">@</span>
                    <!-- O id aqui será capturado pelo JS. Na importação pro app, manter os IDs fixos ou usar refs componentizadas -->
                    <input type="text" id="fs-friends-search-input" class="fs-friends-input"
                        placeholder="Digite o usuário de quem deseja adicionar...">
                    <div class="fs-friends-loading-spinner" id="fs-friends-search-spinner"></div>
                </div>
            </div>

            <!-- Lista de Resultados (Vazia por padrão, recheada pelo JS) -->
            <div class="fs-friends-results" id="fs-friends-results">
                <!-- Javascript irá injetar cards (.fs-user-card) aqui -->
                <div class="fs-state-empty">Digite o @username para buscar...</div>
            </div>
        </div>

        <!-- CONTEÚDO 2: ABA DE PEDIDOS PENDENTES -->
        <div class="fs-tab-content" id="fs-content-requests">
            <div class="fs-friends-results" id="fs-friends-requests-list"></div>
        </div>

        <!-- CONTEÚDO 3: ABA DE AMIGOS ATUAIS -->
        <div class="fs-tab-content" id="fs-content-friends">
            <div class="fs-friends-results" id="fs-friends-friends-list"></div>
        </div>

        <!-- TOAST / Notificações Flutuantes -->
        <div class="fs-toast" id="fs-friends-toast">
            <i>🔔</i>
            <span id="fs-friends-toast-msg">Mensagem padrão</span>
        </div>

    </div>

    <!-- Dependências JS Mockadas - Apenas para visualização -->
    <script src="friends-mock-data.js"></script>
    <script src="friends-mockup.js"></script>

</body>

</html>
